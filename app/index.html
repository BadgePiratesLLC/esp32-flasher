<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Firmware Flasher — Badge Pirates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://badgepirates.com/css/theme.css" />
  <link rel="stylesheet" href="style.css" />
  <script type="module" src="js/main.js"></script>
  <script type="module" src="https://unpkg.com/esp-web-tools@9.0.3/dist/web/install-button.js?module"></script>
</head>
<body>

  <header class="site-header">
    <a href="https://badgepirates.com" class="logo-link">
      Badge<span class="accent">Pirates</span>
    </a>
  </header>

  <main>
    <div class="flasher-card">
      <div class="section-tag">Firmware Flasher</div>
      <h1>Flash Your Badge</h1>
      <p class="card-sub">Select your badge, connect via USB, and flash the latest firmware directly from your browser.</p>

      <div class="field-group">
        <label for="badgeSelect">Select Badge</label>
        <select id="badgeSelect">
          <option value="">-- Choose Badge --</option>
          <option value="basicQACode25">2025 Basic QA Code</option>
          <option value="cactuscon2025">CactusCon 2025</option>
          <option value="bsideskc25">BSidesKC 25</option>
        </select>
      </div>

      <div id="badgePreview">
        <img id="badgeImage" src="" alt="Badge Image" style="display: none;" />
        <p id="badgeDescription" style="display: none;"></p>
      </div>

      <esp-web-install-button id="flashButton" style="display: none;"></esp-web-install-button>
    </div>
  </main>

  <footer>
    <span class="footer-mono">© 2025 BadgePirates LLC — Making badges for fun and no profit</span>
  </footer>

</body>
</html>
